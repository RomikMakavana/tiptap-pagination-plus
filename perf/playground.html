<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>PaginationPlus perf playground</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 20px;
        background: #f2f2f2;
      }
      #status {
        position: sticky;
        top: 0;
        background: #111;
        color: #fff;
        padding: 8px 12px;
        border-radius: 6px;
        margin-bottom: 12px;
        z-index: 10;
        font-variant-numeric: tabular-nums;
      }
      #editor {
        background: #fff;
        margin: 0 auto;
      }
      .ProseMirror {
        outline: none;
      }
      .ProseMirror table {
        border-collapse: collapse;
      }
      .ProseMirror table td,
      .ProseMirror table th {
        border: 1px solid #ccc;
        padding: 4px 8px;
      }
    </style>
  </head>
  <body>
    <div id="status">booting…</div>
    <div id="editor"></div>
    <script type="module" src="./bundle.js"></script>
  </body>
</html>
